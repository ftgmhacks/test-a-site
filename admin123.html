<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FTGM Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: #0f1015; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }
        
        #loginCard { background: #1a1a2e; padding: 30px 20px; border-radius: 16px; text-align: center; margin-top: 15vh; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #loginCard h2 { font-family: 'Anton', sans-serif; color: #4facfe; font-size: 28px; margin-bottom: 20px; }
        
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; font-size: 16px; }
        input:focus { border-color: #4facfe; }
        button { width: 100%; padding: 14px; background: #4facfe; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.98); }

        #dashboard { display: none; width: 100%; max-width: 800px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 15px; }
        header h1 { font-family: 'Anton', sans-serif; color: #4facfe; margin: 0; font-size: 28px; }
        
        /* Mobile Friendly Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 15px; background: #1a1a2e; border-radius: 10px; cursor: pointer; font-weight: 600; color: #aaa; white-space: nowrap; flex: 1; text-align: center; }
        .tab.active { background: #4facfe; color: #fff; }

        .panel { display: none; background: #1a1a2e; padding: 20px; border-radius: 16px; }
        .panel.active { display: block; }
        .panel h3 { margin-top: 0; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 18px; }

        /* Mobile Friendly List Items */
        .list-item { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
        @media(min-width: 600px) { .list-item { flex-direction: row; justify-content: space-between; align-items: center; } }
        .list-info h4 { margin: 0 0 5px 0; color: #4facfe; font-size: 16px; }
        .list-info p { margin: 0; font-size: 12px; color: #aaa; word-break: break-all; }
        
        .actions { display: flex; gap: 8px; width: 100%; }
        @media(min-width: 600px) { .actions { width: auto; } }
        .actions button { padding: 10px; font-size: 14px; flex: 1; border-radius: 8px; }
        .btn-red { background: #ff3b30; } 
        .btn-orange { background: #ff9500; } 
        
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #4facfe; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loginCard">
        <h2>ADMIN PORTAL</h2>
        <input type="text" id="adminUser" placeholder="Username" required>
        <input type="password" id="adminPass" placeholder="Password" required>
        <button id="adminLoginBtn">Login</button>
        <div class="loader" id="loginLoader"></div>
    </div>

    <div id="dashboard">
        <header>
            <h1>FTGM Admin</h1>
            <button id="logoutBtn" style="width:auto; padding: 10px 15px; background:#ff3b30; border-radius: 8px;"><i class="fa-solid fa-power-off"></i></button>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('courses')">📚 Courses</div>
            <div class="tab" onclick="switchTab('users')">👥 Users</div>
            <div class="tab" onclick="switchTab('settings')">⚙️ Settings</div>
        </div>

        <div class="panel active" id="coursesPanel">
            <h3>Publish New Course</h3>
            <input type="text" id="cName" placeholder="Course Title (e.g. Video 1)">
            <input type="text" id="cLink" placeholder="Google Drive Full Link or File ID">
            <button id="addCourseBtn" style="margin-bottom: 20px;">Publish Course</button>
            <div class="loader" id="courseAddLoader"></div>

            <h3>Manage Courses</h3>
            <div id="courseListAdmin"><p style="color:#aaa; text-align:center;">Loading courses...</p></div>
        </div>

        <div class="panel" id="usersPanel">
            <h3>Create New User</h3>
            <input type="email" id="uEmail" placeholder="User Email">
            <input type="text" id="uPass" placeholder="User Password">
            <button id="addUserBtn" style="margin-bottom: 20px;">Generate User</button>

            <h3>Manage Users</h3>
            <div id="userListAdmin"><p style="color:#aaa; text-align:center;">Loading users...</p></div>
        </div>

        <div class="panel" id="settingsPanel">
            <h3>Update Credentials</h3>
            <input type="text" id="newAdminUser" placeholder="New Username">
            <input type="text" id="newAdminPass" placeholder="New Password">
            <button id="updateAdminBtn">Save Admin</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUwg_kC8x3otR67s9gU7pjGEXC6eX2d0g",
            authDomain: "loveable-ftgm.firebaseapp.com",
            databaseURL: "https://loveable-ftgm-default-rtdb.firebaseio.com",
            projectId: "loveable-ftgm",
            storageBucket: "loveable-ftgm.firebasestorage.app",
            messagingSenderId: "905678598158",
            appId: "1:905678598158:web:48fa6b2f36b233cd990c5f",
            measurementId: "G-JQLRXZME6R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 3000, background: '#1a1a2e', color: '#fff' });
        const swalDark = { background: '#1a1a2e', color: '#fff', confirmButtonColor: '#4facfe', cancelButtonColor: '#ff3b30' };

        // --- BULLETPROOF ADMIN LOGIN ---
        document.getElementById('adminLoginBtn').addEventListener('click', async () => {
            const u = document.getElementById('adminUser').value.trim();
            const p = document.getElementById('adminPass').value.trim();
            
            if(!u || !p) return Swal.fire({ ...swalDark, icon: 'warning', title: 'Missing Info', text: 'Enter Username and Password' });

            document.getElementById('adminLoginBtn').style.display = "none";
            document.getElementById('loginLoader').style.display = "block";

            try {
                const adminRef = doc(db, "admin", "config");
                let snap = await getDoc(adminRef);
                
                // Fallback Auto-setup if config doesn't exist
                if (!snap.exists()) { 
                    await setDoc(adminRef, { username: "admin", password: "123" });
                    snap = await getDoc(adminRef); 
                }
                
                if (snap.exists() && snap.data().username === u && snap.data().password === p) {
                    document.getElementById('loginCard').style.display = "none";
                    document.getElementById('dashboard').style.display = "block";
                    Toast.fire({ icon: 'success', title: 'Logged In' });
                    loadDataRealTime();
                } else {
                    Swal.fire({ ...swalDark, icon: 'error', title: 'Access Denied', text: 'Wrong Admin Credentials!' });
                    resetAdminBtn();
                }
            } catch (error) {
                console.error(error);
                Swal.fire({ ...swalDark, icon: 'error', title: 'Connection Error', text: 'Firebase Rules might be blocking access.' });
                resetAdminBtn();
            }
        });

        function resetAdminBtn() {
            document.getElementById('adminLoginBtn').style.display = "block";
            document.getElementById('loginLoader').style.display = "none";
        }

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId + 'Panel').classList.add('active');
        }

        // --- LOAD DATA ---
        function loadDataRealTime() {
            const qCourses = query(collection(db, "courses"), orderBy("timestamp", "desc"));
            onSnapshot(qCourses, (snapshot) => {
                const cList = document.getElementById('courseListAdmin');
                cList.innerHTML = "";
                snapshot.forEach(doc => {
                    let c = doc.data();
                    cList.innerHTML += `
                    <div class="list-item">
                        <div class="list-info"><h4>${c.course_name}</h4><p>ID: ${c.drive_id}</p></div>
                        <div class="actions">
                            <button class="btn-orange" onclick="editCourse('${doc.id}', '${c.course_name}', '${c.drive_id}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-red" onclick="deleteCourse('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
                });
            }, (error) => { console.error(error); });

            onSnapshot(collection(db, "users"), (snapshot) => {
                const uList = document.getElementById('userListAdmin');
                uList.innerHTML = "";
                snapshot.forEach(doc => {
                    let u = doc.data();
                    let blockBtn = u.is_blocked ? 
                        `<button class="btn-orange" onclick="toggleBlock('${doc.id}', false)"><i class="fa-solid fa-unlock"></i></button>` : 
                        `<button class="btn-red" onclick="toggleBlock('${doc.id}', true)"><i class="fa-solid fa-ban"></i></button>`;
                    uList.innerHTML += `
                    <div class="list-item">
                        <div class="list-info"><h4>${u.email}</h4><p>Pass: ${u.password}</p></div>
                        <div class="actions">
                            ${blockBtn}
                            <button class="btn-red" onclick="deleteUser('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
                });
            }, (error) => { console.error(error); });
        }

        // Add Course
        document.getElementById('addCourseBtn').addEventListener('click', async () => {
            const name = document.getElementById('cName').value;
            let link = document.getElementById('cLink').value;
            if(!name || !link) return Toast.fire({ icon: 'warning', title: 'Fill all fields' });

            let driveId = link;
            const match = link.match(/d\/([a-zA-Z0-9_-]+)/);
            if (match) driveId = match[1];

            document.getElementById('addCourseBtn').style.display = "none";
            document.getElementById('courseAddLoader').style.display = "block";

            try {
                await addDoc(collection(db, "courses"), { course_name: name, drive_id: driveId, timestamp: Date.now() });
                document.getElementById('cName').value = ""; document.getElementById('cLink').value = "";
                Toast.fire({ icon: 'success', title: 'Published!' });
            } catch (err) { Swal.fire({...swalDark, icon:'error', title:'Error', text: err.message}); }

            document.getElementById('addCourseBtn').style.display = "block";
            document.getElementById('courseAddLoader').style.display = "none";
        });

        // Global functions for inline onclick events
        window.deleteCourse = async function(id) {
            if(confirm("Delete Course?")) await deleteDoc(doc(db, "courses", id));
        }

        window.editCourse = function(id, oldName, oldId) {
            let nName = prompt("New Course Name:", oldName);
            let nId = prompt("New Drive Link/ID:", oldId);
            if (nName && nId) updateDoc(doc(db, "courses", id), { course_name: nName, drive_id: nId });
        }

        document.getElementById('addUserBtn').addEventListener('click', async () => {
            const email = document.getElementById('uEmail').value;
            const pass = document.getElementById('uPass').value;
            if(!email || !pass) return Toast.fire({ icon: 'warning', title: 'Fill all fields' });
            await addDoc(collection(db, "users"), { email: email, password: pass, device_token: "", is_blocked: false });
            Toast.fire({ icon: 'success', title: 'User Created' });
            document.getElementById('uEmail').value = ""; document.getElementById('uPass').value = "";
        });

        window.deleteUser = async function(id) {
            if(confirm("Permanently delete user?")) await deleteDoc(doc(db, "users", id));
        }

        window.toggleBlock = async function(id, blockStatus) {
            await updateDoc(doc(db, "users", id), { is_blocked: blockStatus });
            Toast.fire({ icon: 'success', title: blockStatus ? 'Blocked' : 'Unblocked' });
        }

        document.getElementById('updateAdminBtn').addEventListener('click', async () => {
            const u = document.getElementById('newAdminUser').value;
            const p = document.getElementById('newAdminPass').value;
            if(!u || !p) return Toast.fire({ icon: 'warning', title: 'Fill all fields' });
            await updateDoc(doc(db, "admin", "config"), { username: u, password: p });
            Swal.fire({ ...swalDark, icon: 'success', title: 'Success', text: 'Admin Credentials Updated!' });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { location.reload(); });
    </script>
</body>
</html>
