<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FTGM Premium Courses</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; color: #fff; min-height: 100vh; background: linear-gradient(-45deg, #0a0a0a, #1a1a2e, #16213e, #0f3460); background-size: 400% 400%; animation: gradientBG 15s ease infinite; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        #login-section, #dashboard-section { width: 100%; display: flex; flex-direction: column; align-items: center; }
        #dashboard-section { display: none; }

        .glass-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); margin-top: 10vh; }
        h2 { font-family: 'Anton', sans-serif; font-size: 32px; letter-spacing: 2px; margin-bottom: 20px; color: #4facfe; }
        
        /* Input font-size 16px prevents auto-zoom on mobile */
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #fff; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #4facfe; box-shadow: 0 0 10px rgba(79, 172, 254, 0.5); }
        button.btn-primary { width: 100%; padding: 15px; background: linear-gradient(90deg, #4facfe, #00f2fe); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); }
        button.btn-primary:active { transform: scale(0.98); }
        
        header { width: 100%; padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { font-family: 'Anton', sans-serif; font-size: 32px; letter-spacing: 2px; background: linear-gradient(90deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .logout-btn { color: #ff3b30; font-size: 26px; cursor: pointer; padding: 10px; background: rgba(255,59,48,0.1); border-radius: 50%; }

        .video-container { width: 95%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; z-index: 10; padding: 20px 0 50px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; display: flex; align-items: center; cursor: pointer; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3); }
        .glass-card:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.98); }
        .play-icon { font-size: 36px; color: #4facfe; margin-right: 15px; }
        .video-info h3 { margin: 0 0 5px; font-size: 16px; font-weight: 600; line-height: 1.2; }
        .video-info p { margin: 0; font-size: 12px; color: #aaa; }

        #video-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; overflow: hidden; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        #video-modal iframe { position: absolute; top: -60px; left: 0; width: 100%; height: calc(100% + 60px); border: none; }
        .close-btn { position: absolute; top: 15px; right: 15px; width: 45px; height: 45px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 50%; color: #fff; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1001; }
        
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #4facfe; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 15px auto; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="glass-box">
            <h2>FTGM ACCESS</h2>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button class="btn-primary" id="loginBtn">Secure Login</button>
            <div class="loader" id="loginLoader"></div>
        </div>
    </div>

    <div id="dashboard-section">
        <header>
            <h1>FTGM Courses</h1>
            <i class="fa-solid fa-power-off logout-btn" id="logoutBtn"></i>
        </header>
        <div class="loader" id="coursesLoader" style="display: block;"></div>
        <div class="video-container" id="courseList"></div>
    </div>

    <div id="video-modal">
        <button class="close-btn" onclick="closeVideo()"><i class="fa-solid fa-xmark"></i></button>
        <div style="position:absolute;top:0;left:0;width:100%;height:70px;z-index:1000;"></div>
        <iframe id="video-frame" src="" allow="autoplay; fullscreen"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc, doc, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUwg_kC8x3otR67s9gU7pjGEXC6eX2d0g",
            authDomain: "loveable-ftgm.firebaseapp.com",
            databaseURL: "https://loveable-ftgm-default-rtdb.firebaseio.com",
            projectId: "loveable-ftgm",
            storageBucket: "loveable-ftgm.firebasestorage.app",
            messagingSenderId: "905678598158",
            appId: "1:905678598158:web:48fa6b2f36b233cd990c5f",
            measurementId: "G-JQLRXZME6R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loginSec = document.getElementById('login-section');
        const dashSec = document.getElementById('dashboard-section');
        const loginBtn = document.getElementById('loginBtn');
        const loginLoader = document.getElementById('loginLoader');

        const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 3000, background: '#1a1a2e', color: '#fff' });

        const localUserId = localStorage.getItem("ftgm_user_id");
        const localToken = localStorage.getItem("ftgm_device_token");

        if (localUserId && localToken) { initDashboard(localUserId, localToken); } 
        else { loginSec.style.display = "flex"; }

        // --- BULLETPROOF LOGIN ---
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!email || !pass) return Swal.fire({ icon: 'warning', title: 'Missing Info', text: 'Please fill all fields!', background: '#1a1a2e', color: '#fff' });

            loginBtn.style.display = "none";
            loginLoader.style.display = "block";

            try {
                const q = query(collection(db, "users"), where("email", "==", email), where("password", "==", pass));
                const snap = await getDocs(q);

                if (!snap.empty) {
                    let userDoc = snap.docs[0];
                    if(userDoc.data().is_blocked === true) {
                        Swal.fire({ icon: 'error', title: 'Access Denied', text: 'Account blocked by Admin.', background: '#1a1a2e', color: '#fff' });
                        resetLoginBtn(); return;
                    }
                    
                    let userId = userDoc.id;
                    let token = Math.random().toString(36).substr(2) + Date.now().toString(36);
                    
                    await updateDoc(doc(db, "users", userId), { device_token: token });
                    localStorage.setItem("ftgm_user_id", userId);
                    localStorage.setItem("ftgm_device_token", token);
                    
                    Toast.fire({ icon: 'success', title: 'Login successful' });
                    initDashboard(userId, token);
                } else {
                    Swal.fire({ icon: 'error', title: 'Login Failed', text: 'Wrong Email or Password!', background: '#1a1a2e', color: '#fff' });
                    resetLoginBtn();
                }
            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'Network Error', text: 'Failed to connect. Check internet or Firebase rules.', background: '#1a1a2e', color: '#fff' });
                resetLoginBtn();
            }
        });

        function resetLoginBtn() {
            loginBtn.style.display = "block";
            loginLoader.style.display = "none";
        }

        function initDashboard(userId, token) {
            loginSec.style.display = "none";
            dashSec.style.display = "flex";

            onSnapshot(doc(db, "users", userId), (docSnap) => {
                if (!docSnap.exists() || docSnap.data().device_token !== token || docSnap.data().is_blocked === true) {
                    let reason = docSnap.data()?.is_blocked ? "You have been Blocked by Admin!" : "Session Expired! Logged in from another device.";
                    Swal.fire({ icon: 'error', title: 'Logged Out', text: reason, background: '#1a1a2e', color: '#fff', confirmButtonColor: '#ff3b30' }).then(() => {
                        localStorage.clear(); window.location.reload();
                    });
                }
            }, (error) => { console.error("Snapshot error:", error); });

            const q = query(collection(db, "courses"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                document.getElementById('coursesLoader').style.display = "none";
                const container = document.getElementById('courseList');
                container.innerHTML = "";

                if(snapshot.empty) { container.innerHTML = '<p style="text-align: center; color: #aaa;">No courses published yet.</p>'; return; }

                snapshot.forEach((doc) => {
                    let c = doc.data();
                    container.innerHTML += `
                    <div class="glass-card" onclick="openVideo('${c.drive_id}')">
                        <div class="play-icon"><i class="fa-solid fa-circle-play"></i></div>
                        <div class="video-info">
                            <h3>${c.course_name}</h3>
                            <p>Tap to play</p>
                        </div>
                    </div>`;
                });
            });
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            Swal.fire({ title: 'Logout?', text: "Are you sure?", icon: 'question', showCancelButton: true, confirmButtonColor: '#ff3b30', background: '#1a1a2e', color: '#fff' })
            .then((res) => { if (res.isConfirmed) { localStorage.clear(); window.location.reload(); } });
        });

        window.openVideo = function(driveId) {
            document.getElementById('video-frame').src = `https://drive.google.com/file/d/${driveId}/preview`;
            document.getElementById('video-modal').style.display = 'block';
        }
        window.closeVideo = function() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('video-frame').src = "";
        }
    </script>
</body>
</html>
