<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGM Truecaller Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --neon-glow: rgba(0, 242, 255, 0.5);
            --bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.8);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 2.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 10px var(--neon-glow);
            text-align: center;
            position: relative;
        }

        /* Animated border accent */
        .main-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, var(--neon), transparent);
            z-index: -1;
            border-radius: 22px;
            opacity: 0.3;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--neon);
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--neon);
            border-radius: 12px;
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 25px var(--neon);
        }

        #resultArea {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .data-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: left;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 0;
        }

        .label { color: #888; text-transform: uppercase; font-size: 0.8rem; }
        .value { color: var(--neon); font-weight: 600; }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 2px solid transparent;
            border-top: 2px solid var(--neon);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-card">
    <h1>Caller Lookup</h1>
    
    <div class="input-box">
        <input type="text" id="phoneNum" placeholder="ENTER NUMBER..." value="923104882921">
    </div>

    <button id="searchBtn" onclick="fetchCallerData()">Identify Target</button>

    <div class="loader" id="loader"></div>

    <div id="resultArea">
        <div class="data-card" id="dataCard">
            </div>
    </div>

    <div class="footer">
        PROTOCOL BY: <span style="color:var(--neon)">RANA FAISAL ALI</span><br>
        FTGM HTML BOSS
    </div>
</div>

<script>
    async function fetchCallerData() {
        const number = document.getElementById('phoneNum').value;
        const btn = document.getElementById('searchBtn');
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('resultArea');
        const dataCard = document.getElementById('dataCard');

        if(!number) return;

        // Reset UI
        btn.style.display = "none";
        loader.style.display = "block";
        resultArea.style.display = "none";

        try {
            const api = `https://test-a-site.vercel.app/api/caller?number=${number}`;
            const res = await fetch(api);
            const json = await res.json();

            // Extracting data safely (Adjust keys based on your actual Truecaller Worker output)
            // Assuming data is inside json.result or json.data
            const mainData = json.result?.data?.[0] || json.result || {};

            dataCard.innerHTML = `
                <div class="data-item">
                    <span class="label">Name</span>
                    <span class="value">${mainData.name || 'Not Found'}</span>
                </div>
                <div class="data-item">
                    <span class="label">Carrier</span>
                    <span class="value">${mainData.carrier || 'Unknown'}</span>
                </div>
                <div class="data-item">
                    <span class="label">Location</span>
                    <span class="value">${mainData.address || 'Global'}</span>
                </div>
                <div class="data-item">
                    <span class="label">Email</span>
                    <span class="value">${mainData.email || 'None'}</span>
                </div>
            `;

            resultArea.style.display = "block";

        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            loader.style.display = "none";
            btn.style.display = "block";
        }
    }
</script>

</body>
  </html>
